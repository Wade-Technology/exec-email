services:
  exec-email:
    build: .
    container_name: exec-email
    restart: unless-stopped
    # Join the shared wade-network so we can reach aspen-admin-backend and the shared postgres.
    # ALSO join nesta-money's internal net so we can double-log inbound/outbound
    # to the nesta `conversations` table for unified MC /communications visibility.
    # nesta-money-postgres is NOT on wade-network, so the second attachment is required.
    networks:
      - wade-network
      - nesta-money-net
    ports:
      - "127.0.0.1:8085:8080"   # /healthz exposed locally for MC poller
    environment:
      - ASPEN_ADMIN_URL=${ASPEN_ADMIN_URL:-http://aspen-admin-backend:8001}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - WADE_BCC_EMAIL=${WADE_BCC_EMAIL:-${WADE_EMAIL:-wadethomaswarren@gmail.com}}
      - IMAP_HOST=${IMAP_HOST:-imap.migadu.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - SMTP_HOST=${SMTP_HOST:-smtp.migadu.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - POLL_INTERVAL_FALLBACK=${POLL_INTERVAL_FALLBACK:-30}
      - MAX_THREAD_TURNS=${MAX_THREAD_TURNS:-3}
      - MAX_PER_SENDER_PER_HOUR=${MAX_PER_SENDER_PER_HOUR:-5}
      - MAX_PER_ROLE_PER_DAY=${MAX_PER_ROLE_PER_DAY:-50}
      - DB_HOST=${DB_HOST:-wtec-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-wtec}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-wtec}
      # Nesta conversations double-log (fire-and-forget; exec_email_threads is authoritative).
      # NESTA_DB_HOST is reachable via the nesta-money-net external attachment below.
      - NESTA_DB_HOST=${NESTA_DB_HOST:-nesta-money-postgres}
      - NESTA_DB_PORT=${NESTA_DB_PORT:-5432}
      - NESTA_DB_USER=${NESTA_DB_USER:-app_user}
      - NESTA_DB_PASSWORD=${NESTA_DB_PASSWORD}
      - NESTA_DB_NAME=${NESTA_DB_NAME:-teller}
      - WADE_TENANT_ID=${WADE_TENANT_ID:-fe0f026f-1bff-497e-b623-3c303cd00699}
      - EXEC_EMAIL_CEO_PASSWORD=${EXEC_EMAIL_CEO_PASSWORD:-}
      - EXEC_EMAIL_CTO_PASSWORD=${EXEC_EMAIL_CTO_PASSWORD:-}
      - EXEC_EMAIL_COO_PASSWORD=${EXEC_EMAIL_COO_PASSWORD:-}
      - EXEC_EMAIL_CSO_PASSWORD=${EXEC_EMAIL_CSO_PASSWORD:-}
      - EXEC_EMAIL_CFO_PASSWORD=${EXEC_EMAIL_CFO_PASSWORD:-}
      - EXEC_EMAIL_CRO_PASSWORD=${EXEC_EMAIL_CRO_PASSWORD:-}
      - EXEC_EMAIL_CCIO_PASSWORD=${EXEC_EMAIL_CCIO_PASSWORD:-}
      - EXEC_EMAIL_HIGGINSDEV_PASSWORD=${EXEC_EMAIL_HIGGINSDEV_PASSWORD:-}

networks:
  wade-network:
    external: true
  # The nesta-money stack owns this net at /root/nesta-money/docker-compose.yml.
  # We attach as an external network so we can reach nesta-money-postgres
  # (which lives on this network and is NOT on wade-network).
  nesta-money-net:
    external: true
    name: nesta-money_nesta-money-net
